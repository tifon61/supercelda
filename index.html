<!DOCTYPE html>
<html>
<head>
    <title>Simulador de Supercelda</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="ui">
        <h3>Control de Cizalladura (Shear)</h3>
        <input type="range" id="shearRange" min="0" max="2" step="0.1" value="0.5">
        <p>Ajusta para ver la deformación del mesociclón</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const count = 3000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for(let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * 10;
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const material = new THREE.PointsMaterial({ size: 0.04, color: 0x00aaff });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        camera.position.z = 15;
        camera.position.y = 2;

        // Variable de control
        const shearInput = document.getElementById('shearRange');

        function animate() {
            requestAnimationFrame(animate);
            const positions = particles.geometry.attributes.position.array;
            const shear = parseFloat(shearInput.value); // Obtenemos el valor del slider
            
            for(let i = 0; i < count; i++) {
                let y = positions[i*3 + 1];
                
                if(y > 5) positions[i*3 + 1] = -5;
                else {
                    positions[i*3 + 1] += 0.03; 
                    // LA MATEMÁTICA: La cizalladura deforma el radio de rotación
                    // A mayor altura, mayor efecto del viento (shear)
                    let radius = 0.5 + (y * shear * 0.2); 
                    positions[i*3] = Math.cos(y * 2) * radius;
                    positions[i*3 + 2] = Math.sin(y * 2) * radius;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += 0.005; // Rotación lenta de la cámara/escena
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
