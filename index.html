<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Matemático de Tormentas 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0f172a; 
            font-family: 'Inter', sans-serif;
            color: white;
            touch-action: none; /* Evita el scroll nativo en móviles en el canvas */
        }
        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        /* Contenedor de paneles dinámico para escritorio y móvil */
        .panels-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
            height: 100%;
            gap: 1rem;
        }
        @media (min-width: 768px) {
            .panels-container {
                flex-direction: row;
                padding: 1.5rem;
            }
        }
        .panel {
            pointer-events: auto;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.25rem;
            max-height: 40vh; /* En móviles no ocupa toda la pantalla */
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        @media (min-width: 768px) {
            .panel { max-height: calc(100vh - 3rem); }
        }
        .math-font {
            font-family: 'Fira Code', monospace;
            color: #38bdf8;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: block;
        }
        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        #toggle-ui-btn {
            pointer-events: auto;
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Botón para móviles y vista inmersiva -->
    <button id="toggle-ui-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-full shadow-lg border border-blue-400 backdrop-blur-md bg-opacity-80 transition-all text-sm">
        👁️ Alternar Paneles
    </button>

    <div id="ui-layer">
        <div class="panels-container mt-12 md:mt-0">
            <!-- Panel Izquierdo: Controles -->
            <div class="panel w-full md:w-80 flex flex-col gap-4" id="panel-left">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Tormentas Lab</h1>
                </div>

                <div>
                    <label class="text-sm font-semibold mb-1 block text-slate-200">Tipo de Tormenta</label>
                    <select id="storm-type" class="w-full bg-slate-800 border border-slate-600 rounded-md p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        <option value="single">Unicelular (Masa de aire)</option>
                        <option value="multi">Multicelular (Línea Turbonada)</option>
                        <option value="super" selected>Supercelda (Clásica)</option>
                    </select>
                </div>

                <!-- MODO RADAR -->
                <div class="bg-slate-800 p-3 rounded-lg border border-slate-600">
                    <label class="flex items-center gap-2 text-sm cursor-pointer font-bold text-yellow-400">
                        <input type="checkbox" id="radar-mode" class="accent-yellow-500 w-5 h-5"> 📡 Vista Radar (dBZ)
                    </label>
                    <p class="text-[10px] text-slate-400 mt-1">Oculta vientos y simula reflectividad top-down.</p>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="text-sm font-semibold flex justify-between">
                            <span>Cizalladura</span> <span id="val-shear" class="text-blue-400">1.0</span>
                        </label>
                        <input type="range" id="shear" min="0" max="3" step="0.1" value="1.0" class="w-full accent-blue-500 mt-1">
                    </div>
                    <div>
                        <label class="text-sm font-semibold flex justify-between">
                            <span>Helicidad</span> <span id="val-helicity" class="text-purple-400">1.5</span>
                        </label>
                        <input type="range" id="helicity" min="0" max="5" step="0.1" value="1.5" class="w-full accent-purple-500 mt-1">
                    </div>
                </div>

                <div class="border-t border-slate-700 pt-3 space-y-2">
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" id="show-wind" checked class="accent-blue-500 w-4 h-4"> Vectores de Viento
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" id="show-fronts" checked class="accent-red-500 w-4 h-4"> Frentes de Ráfagas
                    </label>
                </div>
            </div>

            <!-- Panel Derecho: Matemática -->
            <div class="panel w-full md:w-96 flex flex-col gap-3" id="panel-right">
                <h2 class="text-md font-bold border-b border-slate-700 pb-1" id="math-title">Matemática: Supercelda</h2>
                
                <div>
                    <h3 class="text-sm font-semibold text-slate-200">1. Viento Ambiental</h3>
                    <code class="math-font" id="math-wind">V(z) = V_0 + γ·z</code>
                </div>

                <div>
                    <h3 class="text-sm font-semibold text-slate-200 mt-1">2. Updraft (Ascenso)</h3>
                    <code class="math-font" id="math-updraft">
                        dz/dt = √(2·CAPE) = <span id="eq-w">0.00</span><br>
                        dθ/dt = ω = <span id="eq-omega">0.00</span>
                    </code>
                </div>
                
                <div class="mt-2 p-2 bg-slate-800 rounded-lg text-xs space-y-1" id="legend-box">
                    <div class="flex items-center gap-2"><div class="w-3 h-3 bg-red-400 rounded-full"></div> Updraft (Ascenso)</div>
                    <div class="flex items-center gap-2"><div class="w-3 h-3 bg-green-400 rounded-full"></div> FFD (Lluvia Principal)</div>
                    <div class="flex items-center gap-2"><div class="w-3 h-3 bg-purple-400 rounded-full"></div> RFD (Eco en Gancho)</div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Estado Global de la Interfaz ---
        let PARAMS = {
            type: 'super',
            shear: 1.0,
            helicity: 1.5,
            cape: 2.0,
            radarMode: false
        };

        // Lógica para Ocultar/Mostrar Paneles (Ideal para móviles)
        let uiVisible = true;
        document.getElementById('toggle-ui-btn').addEventListener('click', () => {
            uiVisible = !uiVisible;
            document.getElementById('panel-left').style.display = uiVisible ? 'flex' : 'none';
            document.getElementById('panel-right').style.display = uiVisible ? 'flex' : 'none';
        });

        // --- Configuración de Three.js ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0f172a, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;

        // Entorno
        const gridHelper = new THREE.GridHelper(100, 50, 0x334155, 0x1e293b);
        scene.add(gridHelper);
        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100), 
            new THREE.MeshBasicMaterial({ color: 0x0f172a, depthWrite: false })
        );
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.1;
        scene.add(plane);

        const windGroup = new THREE.Group();
        scene.add(windGroup);
        const windArrows = [];

        function calculateWindAtHeight(y, shear) {
            const baseSpeed = 0.5;
            if (PARAMS.type === 'single') return new THREE.Vector3(baseSpeed, 0, 0);
            if (PARAMS.type === 'multi') return new THREE.Vector3(baseSpeed + (y * shear * 0.8), 0, baseSpeed * 0.5);
            
            // Supercelda (Giro horario con la altura)
            const surfaceAngle = Math.PI * 1.25; 
            const angle = surfaceAngle - (y * shear * 0.15); 
            const speed = baseSpeed + (y * shear * 0.5);
            return new THREE.Vector3(Math.cos(angle) * speed, 0, Math.sin(angle) * speed);
        }

        const levels = [0.5, 8, 16]; 
        const colors = [0xef4444, 0xfacc15, 0x38bdf8];
        levels.forEach((height, index) => {
            for(let x = -15; x <= 15; x+=7.5) {
                for(let z = -15; z <= 15; z+=7.5) {
                    if (Math.abs(x) < 5 && Math.abs(z) < 5) continue;
                    const arrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(x, height, z), 2, colors[index], 0.8, 0.4);
                    windGroup.add(arrow);
                    windArrows.push({ arrow, y: height });
                }
            }
        });

        function createParticleSystem(count, colorHex, size) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const data = [];
            for(let i=0; i<count; i++) {
                data.push({ life: Math.random(), radius: Math.random() * 2, angle: Math.random() * Math.PI * 2 });
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0,0,16,16);

            const material = new THREE.PointsMaterial({
                size: size,
                color: colorHex,
                transparent: true,
                opacity: 0.6,
                map: new THREE.CanvasTexture(canvas),
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const points = new THREE.Points(geometry, material);
            scene.add(points);
            return { points, data, positions, material };
        }

        // Colores Base
        const COLOR_UP = 0xfca5a5; // Rojo claro (Aire cálido)
        const COLOR_FFD = 0x6ee7b7; // Verde (Lluvia)
        const COLOR_RFD = 0xc084fc; // Púrpura (Eco en Gancho)
        // Colores Radar
        const RADAR_FFD = 0x22c55e; // Verde radar (dBZ Medio)
        const RADAR_RFD = 0xef4444; // Rojo radar (dBZ Alto)

        const updraftSys = createParticleSystem(3000, COLOR_UP, 1.2);
        const ffdSys = createParticleSystem(4000, COLOR_FFD, 1.0);
        const rfdSys = createParticleSystem(2000, COLOR_RFD, 1.0);

        // Frentes
        const frontsGroup = new THREE.Group();
        scene.add(frontsGroup);
        const ffdFrontLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(Array(41).fill(new THREE.Vector3())), new THREE.LineBasicMaterial({ color: 0x34d399, linewidth: 3 }));
        const rfdFrontLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(Array(41).fill(new THREE.Vector3())), new THREE.LineBasicMaterial({ color: 0xc084fc, linewidth: 3 }));
        frontsGroup.add(ffdFrontLine);
        frontsGroup.add(rfdFrontLine);

        document.getElementById('storm-type').addEventListener('change', (e) => {
            PARAMS.type = e.target.value;
            const helicityInput = document.getElementById('helicity');
            if (PARAMS.type === 'single') {
                helicityInput.disabled = true; PARAMS.shear = 0.2; document.getElementById('shear').value = 0.2;
            } else if (PARAMS.type === 'multi') {
                helicityInput.disabled = true; PARAMS.shear = 1.5; document.getElementById('shear').value = 1.5;
            } else {
                helicityInput.disabled = false;
            }
            updateMathPanelTexts();
        });

        document.getElementById('shear').addEventListener('input', (e) => { PARAMS.shear = parseFloat(e.target.value); document.getElementById('val-shear').innerText = PARAMS.shear.toFixed(1); });
        document.getElementById('helicity').addEventListener('input', (e) => { PARAMS.helicity = parseFloat(e.target.value); document.getElementById('val-helicity').innerText = PARAMS.helicity.toFixed(1); });
        document.getElementById('show-wind').addEventListener('change', (e) => { windGroup.visible = e.target.checked; });
        document.getElementById('show-fronts').addEventListener('change', (e) => { frontsGroup.visible = e.target.checked; });

        // --- LÓGICA MODO RADAR ---
        document.getElementById('radar-mode').addEventListener('change', (e) => {
            PARAMS.radarMode = e.target.checked;
            if (PARAMS.radarMode) {
                // Cámara Top-Down
                camera.position.set(0, 45, 0);
                camera.lookAt(0, 0, 0);
                
                // Ocultar aire y visuales de entorno
                updraftSys.points.visible = false;
                windGroup.visible = false;
                gridHelper.visible = false;
                document.getElementById('show-wind').disabled = true;

                // Colores tipo Radar Doppler
                ffdSys.material.color.setHex(RADAR_FFD);
                rfdSys.material.color.setHex(RADAR_RFD);
                scene.fog.density = 0; // Quitar niebla para ver claro desde arriba
            } else {
                // Restaurar Cámara y Entorno
                camera.position.set(20, 15, 30);
                camera.lookAt(0, 0, 0);
                
                updraftSys.points.visible = true;
                windGroup.visible = document.getElementById('show-wind').checked;
                gridHelper.visible = true;
                document.getElementById('show-wind').disabled = false;

                // Restaurar colores físicos
                ffdSys.material.color.setHex(COLOR_FFD);
                rfdSys.material.color.setHex(COLOR_RFD);
                scene.fog.density = 0.015;
            }
        });

        function updateMathPanelTexts() {
            const mathWind = document.getElementById('math-wind');
            const eqUp = document.getElementById('math-updraft');

            if (PARAMS.type === 'single') {
                mathWind.innerHTML = `V(z) ≈ V_0 (Cte)`;
                eqUp.innerHTML = `dz/dt = √(2·CAPE)<br>x,y ≈ 0 (Ascenso vertical)`;
            } else if (PARAMS.type === 'multi') {
                mathWind.innerHTML = `V(z) = V_0 + γ·z (Unidireccional)`;
                eqUp.innerHTML = `dz/dt = √(2·CAPE)<br>x(t) = Línea de convergencia`;
            } else {
                mathWind.innerHTML = `V(z) = V_0 + γ·z<br>Hodógrafa Curva`;
                eqUp.innerHTML = `dz/dt = <span id="eq-w">0.00</span><br>dθ/dt = ω = <span id="eq-omega">0.00</span>`;
            }
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            // Actualizar Vectores de Viento
            if(!PARAMS.radarMode) {
                windArrows.forEach(obj => {
                    const vector = calculateWindAtHeight(obj.y, PARAMS.shear);
                    obj.arrow.setDirection(vector.clone().normalize());
                    obj.arrow.setLength(1 + vector.length() * 0.3, 0.4, 0.2);
                });
            }

            let omega = PARAMS.type === 'super' ? PARAMS.helicity * 2 : 0;

            // 1. UPDRAFT (Corriente Ascendente)
            for(let i=0; i<updraftSys.data.length; i++) {
                let p = updraftSys.data[i];
                p.life += dt * 0.2; 
                if(p.life > 1) { p.life = 0; p.radius = 1 + Math.random()*3; p.angle = Math.random() * Math.PI * 2; }

                let y = p.life * 25; 
                p.angle += dt * omega * (1 - p.life*0.5); 

                let currentRadius = p.radius + (y > 15 ? (y - 15) * 1.5 : 0);
                let x = 0, z = 0;

                if (PARAMS.type === 'single') {
                    x = Math.cos(p.angle) * currentRadius * 0.5; z = Math.sin(p.angle) * currentRadius * 0.5;
                } else if (PARAMS.type === 'multi') {
                    x = (p.angle % (Math.PI*2) / (Math.PI*2) - 0.5) * 25; z = (Math.random() - 0.5) * 3;
                    x += (y * y) * PARAMS.shear * 0.01;
                } else {
                    x = Math.cos(p.angle) * currentRadius; z = Math.sin(p.angle) * currentRadius;
                    x += (y * y) * PARAMS.shear * 0.015; z += (y * y) * PARAMS.shear * 0.005;
                }
                updraftSys.positions[i*3] = x; updraftSys.positions[i*3+1] = y; updraftSys.positions[i*3+2] = z;
            }
            updraftSys.points.geometry.attributes.position.needsUpdate = true;

            // 2. FFD (Lluvia Delantera)
            for(let i=0; i<ffdSys.data.length; i++) {
                let p = ffdSys.data[i];
                let y = ffdSys.positions[i*3+1];
                
                if(y <= 0.1 || isNaN(y)) { 
                    p.life -= dt; 
                    if(p.life < 0 || isNaN(y)) {
                        ffdSys.positions[i*3+1] = 12 + Math.random()*8;
                        if (PARAMS.type === 'single') {
                            ffdSys.positions[i*3] = (Math.random()-0.5)*5; ffdSys.positions[i*3+2] = (Math.random()-0.5)*5;
                        } else if (PARAMS.type === 'multi') {
                            ffdSys.positions[i*3] = (Math.random()-0.5)*25; ffdSys.positions[i*3+2] = -4 - Math.random()*6;
                        } else {
                            ffdSys.positions[i*3] = 5 + Math.random()*15; ffdSys.positions[i*3+2] = 5 + Math.random()*15;
                        }
                        p.life = 1;
                    } else {
                        ffdSys.positions[i*3] += (ffdSys.positions[i*3] > 0 ? 1 : -1) * Math.random() * dt * 2;
                        ffdSys.positions[i*3+2] += (ffdSys.positions[i*3+2] > 0 ? 1 : -1) * Math.random() * dt * 2;
                    }
                } else {
                    ffdSys.positions[i*3+1] -= (5 + Math.random()*3) * dt;
                    let wind = calculateWindAtHeight(y, PARAMS.shear);
                    ffdSys.positions[i*3] += (PARAMS.type === 'single' ? 0 : wind.x * dt * 0.5);
                    ffdSys.positions[i*3+2] += (PARAMS.type === 'single' ? 0 : wind.z * dt * 0.5);
                }
            }
            ffdSys.points.geometry.attributes.position.needsUpdate = true;

            // 3. RFD (Eco en Gancho)
            rfdSys.points.visible = (PARAMS.type === 'super');
            if (PARAMS.type === 'super') {
                for(let i=0; i<rfdSys.data.length; i++) {
                    let p = rfdSys.data[i];
                    let y = rfdSys.positions[i*3+1];
                    if(isNaN(y)) y = 0; 

                    if(y <= 0.1) {
                        p.life -= dt;
                        if(p.life < 0) {
                            rfdSys.positions[i*3+1] = 8 + Math.random()*5;
                            rfdSys.positions[i*3] = -5 - Math.random()*5; rfdSys.positions[i*3+2] = -5 + Math.random()*5;
                            p.life = 1; p.angle = Math.PI; 
                        } else {
                            p.angle -= dt * 2; 
                            let r = 2 + p.life * 3;
                            rfdSys.positions[i*3] = Math.cos(p.angle) * r; rfdSys.positions[i*3+2] = Math.sin(p.angle) * r;
                        }
                    } else {
                        rfdSys.positions[i*3+1] -= (6 + Math.random()*2) * dt;
                        p.angle -= dt * PARAMS.helicity * 0.5; 
                        let currentR = 4 + y*0.2;
                        rfdSys.positions[i*3] = Math.cos(p.angle) * currentR; rfdSys.positions[i*3+2] = Math.sin(p.angle) * currentR;
                    }
                }
            } else {
                for(let i=0; i<rfdSys.data.length; i++) rfdSys.positions[i*3+1] = -100; // Esconder en suelo seguro
            }
            rfdSys.points.geometry.attributes.position.needsUpdate = true;

            // 4. Frentes de ráfagas
            let ptsFront1 = ffdFrontLine.geometry.attributes.position.array;
            let ptsFront2 = rfdFrontLine.geometry.attributes.position.array;
            
            for(let i=0; i<=40; i++) {
                let t = i/40;
                let scalePulse = 1 + Math.sin(time * 2) * 0.05; 
                
                if (PARAMS.type === 'single') {
                    let angle = t * Math.PI * 2; let radius = 6 * scalePulse;
                    ptsFront1[i*3] = Math.cos(angle) * radius; ptsFront1[i*3+1] = 0.1; ptsFront1[i*3+2] = Math.sin(angle) * radius;
                    ptsFront2[i*3] = 0; ptsFront2[i*3+1] = -10; ptsFront2[i*3+2] = 0; 
                } else if (PARAMS.type === 'multi') {
                    ptsFront1[i*3] = (t - 0.5) * 35; ptsFront1[i*3+1] = 0.1; ptsFront1[i*3+2] = 5 * scalePulse;
                    ptsFront2[i*3] = 0; ptsFront2[i*3+1] = -10; ptsFront2[i*3+2] = 0; 
                } else {
                    ptsFront1[i*3] = 5 + (t)*15 * scalePulse; ptsFront1[i*3+1] = 0.1; ptsFront1[i*3+2] = -5 + (t)*25 * scalePulse;
                    let angleRFD = t * Math.PI; let rRFD = (3 + t*2) * scalePulse;
                    ptsFront2[i*3] = -rRFD*Math.cos(angleRFD); ptsFront2[i*3+1] = 0.1; ptsFront2[i*3+2] = -rRFD*Math.sin(angleRFD);
                }
            }
            ffdFrontLine.geometry.attributes.position.needsUpdate = true;
            rfdFrontLine.geometry.attributes.position.needsUpdate = true;
            rfdFrontLine.visible = document.getElementById('show-fronts').checked && (PARAMS.type === 'super') && !PARAMS.radarMode;
            ffdFrontLine.visible = document.getElementById('show-fronts').checked && !PARAMS.radarMode;

            // Actualización segura de textos matemáticos
            const elW = document.getElementById('eq-w');
            if (elW) elW.innerText = `${(PARAMS.cape * 0.1).toFixed(2)} m/s`;
            const elOmega = document.getElementById('eq-omega');
            if (elOmega) elOmega.innerText = `${(PARAMS.helicity * 0.05).toFixed(2)} rad/s`;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateMathPanelTexts(); 
        animate();
    </script>
</body>
</html>
